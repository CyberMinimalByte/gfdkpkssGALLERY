<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические шоколадки 🍫🔧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0c10 0%, #1a1f2a 100%);
            color: #f0f3f8;
            font-family: 'Inter', system-ui, -apple-system, 'Comic Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .container {
            max-width: 600px;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(17, 22, 29, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(42, 47, 58, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease;
            transition: all 0.3s;
        }
        .emoji {
            font-size: 6rem;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        h1 {
            font-size: 2.5rem;
            margin: 1rem 0;
            background: linear-gradient(135deg, #a78bfa, #e74c3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            color: #9aa4bf;
        }
        .fun-fact {
            background: rgba(108, 92, 231, 0.2);
            border-radius: 2rem;
            padding: 0.8rem;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            border-left: 3px solid #6c5ce7;
        }
        .counter {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: #2a2f3a;
            cursor: default;
            user-select: none;
        }
        .secret-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            opacity: 0;
            cursor: default;
        }
        /* Админ-панель */
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #11161d;
            border: 2px solid #6c5ce7;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            z-index: 2000;
            display: none;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5);
            animation: modalIn 0.3s ease;
        }
        .admin-panel h2 {
            color: #6c5ce7;
            margin-bottom: 1rem;
            text-align: center;
        }
        .admin-panel input, .admin-panel textarea, .admin-panel select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: #1a1f2a;
            border: 1px solid #2a2f3a;
            border-radius: 1rem;
            color: #f0f3f8;
            font-family: inherit;
        }
        .admin-panel button {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            background: #6c5ce7;
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-panel button:hover { background: #5b4bc4; }
        .admin-panel .close-btn {
            background: #e74c3c;
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: auto;
            padding: 0.3rem 0.8rem;
            margin: 0;
        }
        .status-badge {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 100;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #6c5ce7;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="status-badge" id="statusBadge">🍫 Тех. режим</div>
    
    <div class="container" id="mainContainer">
        <div class="emoji" id="mainEmoji">🍫🔧</div>
        <h1 id="mainTitle">Технические шоколадки</h1>
        <div class="message" id="mainMessage">
            Сайт временно недоступен.<br>
            Ведутся профилактические работы.<br>
            Приносим извинения за неудобства.
        </div>
        <div class="fun-fact" id="funFact">
            💡 Знаете ли вы? Ping не является методом DDoS-атаки с 1998 года.
        </div>
    </div>
    
    <div class="counter" id="clickCounter">🍫</div>
    <div class="secret-zone" id="secretZone"></div>
    
    <!-- Админ-панель -->
    <div class="admin-panel" id="adminPanel">
        <button class="close-btn" id="closeAdminBtn">✖</button>
        <h2>🍫🔧 Админ-панель шоколадок</h2>
        <input type="password" id="adminPassword" placeholder="Пароль админа">
        <button id="loginAdminBtn">Войти</button>
        <div id="adminContent" style="display: none;">
            <hr style="margin: 1rem 0; border-color: #2a2f3a;">
            <h3>Управление заглушкой</h3>
            <input type="text" id="titleInput" placeholder="Заголовок">
            <textarea id="messageInput" rows="3" placeholder="Текст сообщения"></textarea>
            <input type="text" id="emojiInput" placeholder="Эмодзи (например, 🍫🔧)">
            <select id="presetSelect">
                <option value="default">🍫 Технические шоколадки</option>
                <option value="dildo">🐧 Дилдоинукс</option>
                <option value="ping">📡 Пинг-атака</option>
                <option value="cloudflare">🛡️ Cloudflare</option>
                <option value="hacker">💀 Мамкин хакер</option>
                <option value="friend">😈 Специально для друга</option>
            </select>
            <button id="applyBtn">Применить</button>
            <button id="resetBtn" style="background: #e67e22;">Сбросить</button>
            <button id="activateSiteBtn" style="background: #2ecc71;">ВКЛЮЧИТЬ САЙТ</button>
            <hr style="margin: 1rem 0;">
            <h3>Статистика</h3>
            <p id="statsInfo">Загрузка...</p>
            <button id="refreshStatsBtn">Обновить</button>
        </div>
    </div>

    <script>
        // Секретные настройки
        let isAdminLogged = false;
        let adminPassword = "admin555111"; // пароль как на основном сайте
        
        // Забавные пресеты
        const presets = {
            default: {
                title: "Технические шоколадки",
                message: "Сайт временно недоступен.\nВедутся профилактические работы.\nПриносим извинения за неудобства.",
                emoji: "🍫🔧"
            },
            dildo: {
                title: "🐧 Дилдоинукс Maintenance",
                message: "Идёт установка дилдоинукса на сервер.\nПримерное время: от 5 минут до 5 часов.\n(зависит от того, найдёт ли админ нужную команду)",
                emoji: "🐧💀"
            },
            ping: {
                title: "📡 Ping-of-Peace",
                message: "Сервер отражает входящие пинги.\nЗафиксировано попыток DDoS: 1\n(это был ping от друга)",
                emoji: "📡🛡️"
            },
            cloudflare: {
                title: "🛡️ Cloudflare Shield Active",
                message: "Ваш DDoS был съеден на завтрак.\nCloudflare даже не заметил.\nПопробуйте что-нибудь посложнее ping.",
                emoji: "🛡️☁️"
            },
            hacker: {
                title: "💀 Мамкин хакер детектед",
                message: "Обнаружена попытка DDoS-атаки.\nИсточник: localhost\nПричина: установка дилдоинукса\nСтатус: компьютер жертвы не отвечает",
                emoji: "💀🐧"
            },
            friend: {
                title: "😈 Специально для Тимохи",
                message: "Сайт работает, просто тебя сюда не пускают.\nИди переустанавливай Windows, хакер.\nP.S. Cloudflare настроен, ping не поможет.",
                emoji: "😈🍫"
            }
        };
        
        let currentPreset = "default";
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function loadPreset(presetKey) {
            const preset = presets[presetKey];
            if (preset) {
                document.getElementById('titleInput').value = preset.title;
                document.getElementById('messageInput').value = preset.message;
                document.getElementById('emojiInput').value = preset.emoji;
                currentPreset = presetKey;
                if (isAdminLogged) {
                    applyChanges();
                }
            }
        }
        
        function applyChanges() {
            const title = document.getElementById('titleInput').value;
            const message = document.getElementById('messageInput').value;
            const emoji = document.getElementById('emojiInput').value;
            
            document.getElementById('mainTitle').innerHTML = title;
            document.getElementById('mainMessage').innerHTML = message.replace(/\n/g, '<br>');
            document.getElementById('mainEmoji').innerHTML = emoji;
            
            localStorage.setItem('chocolate_title', title);
            localStorage.setItem('chocolate_message', message);
            localStorage.setItem('chocolate_emoji', emoji);
            
            showToast('🍫 Заглушка обновлена!');
        }
        
        function resetToDefault() {
            loadPreset('default');
            applyChanges();
            showToast('🍫 Возврат к стандартным шоколадкам');
        }
        
        function activateSite() {
            if (confirm('Точно включаем сайт? Технические шоколадки исчезнут.')) {
                // Перенаправление на реальный сайт
                window.location.href = '/?admin_override=1';
            }
        }
        
        // Секретный доступ по кликам
        let clickCount = 0;
        let lastClickTime = 0;
        
        const secretZone = document.getElementById('secretZone');
        const adminPanel = document.getElementById('adminPanel');
        const statusBadge = document.getElementById('statusBadge');
        
        secretZone.addEventListener('click', (e) => {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastClickTime > 2000) clickCount = 0;
            clickCount++;
            lastClickTime = now;
            
            if (clickCount === 3) {
                showToast("🔓 Открываю админ-панель...");
                adminPanel.style.display = 'block';
                clickCount = 0;
            } else if (clickCount === 1) {
                showToast("🍫 Ещё 2 клика внизу для админки");
            } else if (clickCount === 2) {
                showToast("🔧 Ещё 1 клик!");
            }
        });
        
        // Админ-панель логика
        document.getElementById('closeAdminBtn').onclick = () => {
            adminPanel.style.display = 'none';
            isAdminLogged = false;
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            showToast('Админ-панель закрыта');
        };
        
        document.getElementById('loginAdminBtn').onclick = () => {
            const pass = document.getElementById('adminPassword').value;
            if (pass === adminPassword) {
                isAdminLogged = true;
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('loginAdminBtn').style.display = 'none';
                document.getElementById('adminPassword').style.display = 'none';
                showToast('🔓 Добро пожаловать, администратор шоколадок!');
                
                // Загружаем сохранённые настройки
                const savedTitle = localStorage.getItem('chocolate_title');
                const savedMessage = localStorage.getItem('chocolate_message');
                const savedEmoji = localStorage.getItem('chocolate_emoji');
                if (savedTitle) document.getElementById('titleInput').value = savedTitle;
                if (savedMessage) document.getElementById('messageInput').value = savedMessage;
                if (savedEmoji) document.getElementById('emojiInput').value = savedEmoji;
                
                // Статистика
                document.getElementById('statsInfo').innerHTML = `
                    🍫 Версия заглушки: ${localStorage.getItem('chocolate_version') || '1.0'}<br>
                    🔧 Последнее изменение: ${localStorage.getItem('chocolate_last_updated') || 'неизвестно'}<br>
                    📡 Отражено пингов: ${Math.floor(Math.random() * 100)}<br>
                    🐧 Установок дилдоинукса: 1<br>
                    😈 Сообщений для друга: 42
                `;
            } else {
                showToast('❌ Неверный пароль!');
                document.getElementById('adminPassword').value = '';
            }
        };
        
        document.getElementById('applyBtn').onclick = () => {
            if (isAdminLogged) {
                applyChanges();
                localStorage.setItem('chocolate_last_updated', new Date().toLocaleString());
                localStorage.setItem('chocolate_version', '2.0');
                document.getElementById('statsInfo').innerHTML = `
                    🍫 Версия заглушки: 2.0<br>
                    🔧 Последнее изменение: ${new Date().toLocaleString()}<br>
                    📡 Отражено пингов: ${Math.floor(Math.random() * 100)}<br>
                    🐧 Установок дилдоинукса: 1<br>
                    😈 Сообщений для друга: 42
                `;
            }
        };
        
        document.getElementById('resetBtn').onclick = () => {
            if (isAdminLogged) resetToDefault();
        };
        
        document.getElementById('activateSiteBtn').onclick = () => {
            if (isAdminLogged) activateSite();
        };
        
        document.getElementById('presetSelect').onchange = (e) => {
            if (isAdminLogged) loadPreset(e.target.value);
        };
        
        document.getElementById('refreshStatsBtn').onclick = () => {
            document.getElementById('statsInfo').innerHTML = `
                🍫 Версия заглушки: ${localStorage.getItem('chocolate_version') || '1.0'}<br>
                🔧 Последнее изменение: ${localStorage.getItem('chocolate_last_updated') || 'неизвестно'}<br>
                📡 Отражено пингов: ${Math.floor(Math.random() * 100)}<br>
                🐧 Установок дилдоинукса: 1<br>
                😈 Сообщений для друга: ${Math.floor(Math.random() * 100)}
            `;
            showToast('📊 Статистика обновлена');
        };
        
        // Забавные факты
        const funFacts = [
            "💡 Знаете ли вы? Ping не является методом DDoS-атаки с 1998 года.",
            "🔧 Дилдоинукс — это не настоящий дистрибутив. Надеюсь, вы поняли это до установки.",
            "🍫 Cloudflare защищает 20% всех сайтов в мире. Ваш ping против них — как муха против слона.",
            "🤖 Нейронка сказала, что DDoS — это плохо. Слушайтесь нейронку.",
            "🎮 Друг пытался DDoS через ping. Это было очень мило.",
            "⚡ Настоящие хакеры не спрашивают нейронки, как DDoS-ить. Они читают мануалы.",
            "🍫🔧 Технические шоколадки — это не баг, это фича.",
            "💀 Ваш 'DDoS' был зафиксирован. В журнале ошибок: 'получен ping, ответ отправлен'.",
            "🛡️ Cloudflare даже не заметил вашу атаку. Он спал.",
            "🎭 Не пытайтесь DDoS-ить друзей. Лучше попросите у них пароль от админки."
        ];
        
        setInterval(() => {
            const randomFact = funFacts[Math.floor(Math.random() * funFacts.length)];
            document.getElementById('funFact').innerHTML = randomFact;
        }, 15000);
        
        // Анимация статус-бейджа
        setInterval(() => {
            if (!isAdminLogged) {
                const badges = ["🍫 Тех. режим", "🔧 Шоколадки", "🍫🔧", "🛡️ Cloudflare", "🐧 Нет DDoS"];
                statusBadge.innerHTML = badges[Math.floor(Math.random() * badges.length)];
            }
        }, 5000);
        
        // Загрузка сохранённых настроек
        const savedTitle = localStorage.getItem('chocolate_title');
        const savedMessage = localStorage.getItem('chocolate_message');
        const savedEmoji = localStorage.getItem('chocolate_emoji');
        if (savedTitle) document.getElementById('mainTitle').innerHTML = savedTitle;
        if (savedMessage) document.getElementById('mainMessage').innerHTML = savedMessage.replace(/\n/g, '<br>');
        if (savedEmoji) document.getElementById('mainEmoji').innerHTML = savedEmoji;
    </script>
</body>
</html>
