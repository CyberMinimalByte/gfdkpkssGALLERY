<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaGallery — Галерея с галочками</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0c10;
            color: #f0f3f8;
            padding: 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            background: #11161d; padding: 1rem 1.8rem; border-radius: 2rem;
            border: 1px solid #2a2f3a; margin-bottom: 2rem;
        }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, #a78bfa, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-area { display: flex; gap: 1rem; align-items: center; }
        button, .button-like {
            background: #6c5ce7; color: white; border: none; padding: 0.5rem 1.2rem;
            border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #5b4bc4; }
        .btn-outline { background: transparent; border: 1px solid #2a2f3a; }
        .form-card {
            background: #11161d; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem;
            border: 1px solid #2a2f3a;
        }
        .input-group { margin-bottom: 1rem; }
        input, textarea {
            width: 100%; padding: 0.8rem 1rem; background: #1a1f2a; border: 1px solid #2a2f3a;
            border-radius: 1rem; color: #f0f3f8; font-family: inherit;
        }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem; margin-top: 1.5rem;
        }
        .photo-card {
            background: #1a1f2a; border-radius: 1.5rem; overflow: hidden; border: 1px solid #2a2f3a;
            cursor: pointer; transition: transform 0.2s; position: relative;
        }
        .photo-card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; }
        .card-content { padding: 1rem; }
        .card-text { font-weight: 500; margin-bottom: 0.5rem; word-break: break-word; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #9aa4bf; align-items: center; }
        .verified-badge { color: #3b82f6; margin-left: 4px; }
        .admin-delete-btn {
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
            border: none; color: #e74c3c; border-radius: 50%; width: 28px; height: 28px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.7; transition: 0.2s;
        }
        .admin-delete-btn:hover { opacity: 1; background: rgba(231,76,60,0.8); color: white; }
        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #11161d; max-width: 90vw; max-height: 90vh; border-radius: 1.5rem;
            display: flex; flex-direction: column; overflow: auto; width: 800px;
        }
        .modal-img { width: 100%; max-height: 60vh; object-fit: contain; background: #000; }
        .modal-info { padding: 1.5rem; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; color: white; }
        .like-buttons { display: flex; gap: 1rem; margin: 1rem 0; }
        .comments-section { margin-top: 1rem; }
        .comment {
            border-bottom: 1px solid #2a2f3a; padding: 0.5rem 0; display: flex; justify-content: space-between;
        }
        .comment-text { flex: 1; }
        .comment-meta { font-size: 0.7rem; color: #9aa4bf; margin-bottom: 0.2rem; }
        .comment-actions { margin-left: 1rem; }
        .delete-comment { background: none; border: none; color: #e74c3c; cursor: pointer; }
        .admin-section {
            background: #11161d; border-radius: 1.5rem; padding: 1rem; margin: 1rem 0;
        }
        .user-item, .pending-item {
            display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #2a2f3a;
            align-items: center;
        }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: #2ecc71; padding: 0.8rem 1.5rem;
            border-radius: 2rem; z-index: 1100; animation: fadeOut 3s forwards;
        }
        .toast.error { background: #e74c3c; }
        @keyframes fadeOut {
            0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; }
        }
        hr { border-color: #2a2f3a; margin: 1rem 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .edit-text { margin-top: 0.5rem; display: flex; gap: 0.5rem; }
        .edit-text input { flex: 1; padding: 0.3rem; font-size: 0.8rem; }
        .copy-link { cursor: pointer; background: none; border: none; color: #6c5ce7; }
        .view-counter { font-size: 0.7rem; margin-left: 1rem; }
        /* Loader overlay */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,12,16,0.95); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 1.2rem; gap: 1rem;
        }
        .loader-spinner {
            border: 4px solid #2a2f3a; border-top: 4px solid #6c5ce7; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fun-fact {
            background: #1a1f2a; padding: 1rem 2rem; border-radius: 2rem; max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-images"></i> LuminaGallery</h1>
            <p>Галочки, комментарии, ваши фото</p>
        </div>
        <div id="userArea" class="user-area"></div>
    </div>

    <div id="authPanel" class="form-card"></div>
    <div id="uploadPanel" style="display: none;" class="form-card">
        <h3><i class="fas fa-cloud-upload-alt"></i> Добавить фото</h3>
        <div class="input-group">
            <input type="file" id="uploadFile" accept="image/jpeg,image/png,image/webp">
            <div id="fileError" style="color:#e74c3c; font-size:0.8rem; margin-top:0.3rem;"></div>
        </div>
        <div class="input-group">
            <textarea id="uploadText" rows="2" placeholder="Описание..."></textarea>
        </div>
        <button id="submitUpload" disabled><i class="fas fa-spinner fa-spin"></i> Загрузить</button>
        <div id="uploadPreview" style="margin-top: 10px;"></div>
    </div>

    <div class="flex-between">
        <h2>Галерея</h2>
        <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="width: 250px;">
    </div>
    <div id="galleryContainer" class="gallery-grid"></div>

    <div id="historySection" style="margin-top: 2rem; display: none;">
        <h2>Мои загрузки (история)</h2>
        <div id="historyContainer" class="gallery-grid"></div>
    </div>

    <div id="adminPanel"></div>
</div>

<div id="modal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-info">
            <div id="modalMeta"></div>
            <div class="like-buttons">
                <button id="modalLikeBtn" class="like-btn"><i class="fas fa-thumbs-up"></i> <span id="likeCount">0</span></button>
                <button id="modalDislikeBtn" class="dislike-btn"><i class="fas fa-thumbs-down"></i> <span id="dislikeCount">0</span></button>
                <button id="copyLinkBtn" class="copy-link"><i class="fas fa-link"></i> Скопировать ссылку</button>
            </div>
            <div class="comments-section">
                <h4>Комментарии</h4>
                <div id="commentsList"></div>
                <div class="input-group">
                    <textarea id="newCommentText" rows="2" placeholder="Ваш комментарий..."></textarea>
                    <button id="submitComment">Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let currentModalUpload = null;
    let currentUploads = [];
    let activityInterval = null;
    let lastActivityIds = { comments: [], likes: [] };

    // Забавные подсказки
    const funFacts = [
        "🌟 Знаете ли вы? Первая цифровая фотография была сделана в 1957 году!",
        "📸 Самая дорогая фотография в мире продана за $4.3 млн.",
        "🐱 Кошки чаще всего фотографируются в интернете!",
        "🌙 На Луне сделано всего 12 фотографий с людьми.",
        "🎨 Первое селфи сделал Роберт Корнелиус в 1839 году.",
        "💡 Каждый день в мире делают около 1.4 триллиона фото!",
        "🔍 Фотография может хранить информацию, которую не видит глаз.",
        "🎞️ Старейшая сохранившаяся фотография сделана в 1826 году.",
        "👻 Люди чаще улыбаются на фото, чем в реальной жизни.",
        "📱 92% всех фото сегодня снимаются на телефоны."
    ];

    function showLoader() {
        const overlay = document.createElement('div');
        overlay.className = 'loader-overlay';
        overlay.id = 'loaderOverlay';
        const randomFact = funFacts[Math.floor(Math.random() * funFacts.length)];
        overlay.innerHTML = `
            <div class="loader-spinner"></div>
            <div class="fun-fact">${randomFact}</div>
        `;
        document.body.appendChild(overlay);
    }

    function hideLoader() {
        const el = document.getElementById('loaderOverlay');
        if (el) el.remove();
    }

    async function apiCall(url, options = {}) {
        const response = await fetch(url, {
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', ...options.headers },
            ...options
        });
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.error || 'Request failed');
        }
        if (response.status === 204) return null;
        return await response.json();
    }

    function showMessage(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadCurrentUser() {
        try {
            const user = await apiCall('/api/me');
            currentUser = user;
            renderUI();
        } catch (e) {
            currentUser = null;
            renderUI();
        } finally {
            hideLoader();
        }
    }

    async function login(username, password) {
        try {
            const user = await apiCall('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            currentUser = user;
            renderUI();
            showMessage(`Добро пожаловать, ${username}`);
        } catch (e) {
            showMessage(e.message, true);
        }
    }

    async function register(username, password) {
        try {
            await apiCall('/api/register', { method: 'POST', body: JSON.stringify({ username, password }) });
            showMessage('Регистрация успешна, теперь войдите');
        } catch (e) {
            showMessage(e.message, true);
        }
    }

    async function logout() {
        await apiCall('/api/logout', { method: 'POST' });
        currentUser = null;
        renderUI();
        showMessage('Вы вышли');
    }

    async function loadGallery() {
        currentUploads = await apiCall('/api/uploads');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = currentUploads.filter(u => u.text.toLowerCase().includes(searchTerm) || u.username.toLowerCase().includes(searchTerm));
        const container = document.getElementById('galleryContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Нет фото</div>';
            return;
        }
        container.innerHTML = filtered.map(u => `
            <div class="photo-card" data-id="${u.id}">
                <img class="card-img" src="/uploads/${u.image_path}" alt="photo" onerror="this.src='https://placehold.co/400x400?text=error'">
                <div class="card-content">
                    <div class="card-text">${escapeHtml(u.text)}</div>
                    <div class="card-meta">
                        <span><i class="fas fa-user"></i> ${escapeHtml(u.username)} ${u.username_verified ? '<i class="fas fa-check-circle verified-badge" title="Верифицирован"></i>' : ''}</span>
                        <span><i class="far fa-calendar-alt"></i> ${new Date(u.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
                ${currentUser && currentUser.is_admin ? `<button class="admin-delete-btn" data-id="${u.id}" title="Удалить фото"><i class="fas fa-trash-alt"></i></button>` : ''}
            </div>
        `).join('');
        document.querySelectorAll('.photo-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.admin-delete-btn')) return;
                const id = card.getAttribute('data-id');
                const upload = currentUploads.find(u => u.id == id);
                if (upload) openModal(upload);
            });
        });
        document.querySelectorAll('.admin-delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('Удалить фото?')) {
                    await apiCall(`/api/uploads/${id}`, { method: 'DELETE' });
                    showMessage('Фото удалено');
                    loadGallery();
                    loadHistory();
                    loadAdminPanel();
                    if (currentModalUpload && currentModalUpload.id == id) {
                        document.getElementById('modal').style.display = 'none';
                    }
                }
            });
        });
    }

    async function loadHistory() {
        if (!currentUser) return;
        const myUploads = currentUploads.filter(u => u.user_id === currentUser.id);
        const section = document.getElementById('historySection');
        const container = document.getElementById('historyContainer');
        if (myUploads.length === 0) {
            section.style.display = 'none';
            return;
        }
        section.style.display = 'block';
        container.innerHTML = myUploads.map(u => `
            <div class="photo-card" data-id="${u.id}">
                <img class="card-img" src="/uploads/${u.image_path}" alt="photo">
                <div class="card-content">
                    <div class="card-text">${escapeHtml(u.text)}</div>
                    <div class="card-meta">
                        <span>${new Date(u.created_at).toLocaleString()}</span>
                        <div>
                            <button class="edit-own-btn" data-id="${u.id}" style="background:none; border:none; color:#6c5ce7; cursor:pointer;"><i class="fas fa-edit"></i></button>
                            <button class="delete-own-btn" data-id="${u.id}" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.delete-own-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('Удалить фото?')) {
                    await apiCall(`/api/uploads/${id}`, { method: 'DELETE' });
                    showMessage('Удалено');
                    loadGallery();
                    loadHistory();
                    loadAdminPanel();
                }
            });
        });
        container.querySelectorAll('.edit-own-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const upload = myUploads.find(u => u.id == id);
                const newText = prompt('Введите новый текст:', upload.text);
                if (newText !== null) {
                    await apiCall(`/api/uploads/${id}`, { method: 'PUT', body: JSON.stringify({ text: newText }) });
                    showMessage('Текст обновлён');
                    loadGallery();
                    loadHistory();
                }
            });
        });
    }

    async function loadAdminPanel() {
        const container = document.getElementById('adminPanel');
        if (!currentUser || !currentUser.is_admin) {
            container.innerHTML = '';
            return;
        }
        const users = await apiCall('/api/admin/users');
        const userListHtml = users.map(u => `
            <div class="user-item">
                <span>${escapeHtml(u.username)} ${u.is_admin ? '(Админ)' : ''} ${u.verified ? '<i class="fas fa-check-circle" style="color:#3b82f6"></i>' : ''}</span>
                <div>
                    ${!u.is_admin ? `<button class="verify-btn" data-id="${u.id}">${u.verified ? 'Снять галочку' : 'Выдать галочку'}</button>` : ''}
                    ${!u.is_admin ? `<button class="del-user-btn" data-id="${u.id}">Удалить</button>` : ''}
                </div>
            </div>
        `).join('');
        container.innerHTML = `
            <div class="admin-section">
                <h3>Админ-панель</h3>
                <h4>Пользователи</h4>
                ${userListHtml || '<p>Нет</p>'}
            </div>
        `;
        container.querySelectorAll('.verify-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                await apiCall(`/api/admin/users/${id}/verify`, { method: 'POST' });
                showMessage('Статус изменён');
                loadAdminPanel();
                loadGallery(); // чтобы обновить отображение галочек в галерее
                if (currentUser && currentUser.id == id) {
                    currentUser.verified = !currentUser.verified;
                    renderUserArea();
                }
            });
        });
        container.querySelectorAll('.del-user-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm('Удалить пользователя?')) {
                    await apiCall(`/api/admin/users/${id}`, { method: 'DELETE' });
                    showMessage('Пользователь удалён');
                    loadAdminPanel();
                    loadGallery();
                    loadHistory();
                }
            });
        });
    }

    async function uploadPhoto(file, text) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('text', text);
        const response = await fetch('/api/uploads', {
            method: 'POST',
            credentials: 'include',
            body: formData
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error);
        }
        return await response.json();
    }

    async function openModal(upload) {
        currentModalUpload = upload;
        document.getElementById('modalImg').src = `/uploads/${upload.image_path}`;
        document.getElementById('modalMeta').innerHTML = `
            <strong>${escapeHtml(upload.username)} ${upload.username_verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</strong><br>
            <div id="modalText">${escapeHtml(upload.text)}</div>
            <small>${new Date(upload.created_at).toLocaleString()}</small>
            <span class="view-counter"><i class="fas fa-eye"></i> ${upload.views || 0} просмотров</span>
            ${currentUser && (currentUser.is_admin || currentUser.id === upload.user_id) ? `<button id="editTextBtn" class="btn-outline" style="margin-left:1rem;">✎ Редактировать</button>` : ''}
        `;
        await refreshModalStats(upload.id);
        await loadComments(upload.id);
        document.getElementById('modal').style.display = 'flex';
        // увеличить счётчик просмотров
        await apiCall(`/api/uploads/${upload.id}/view`, { method: 'POST' });
        upload.views = (upload.views || 0) + 1;
        if (document.getElementById('editTextBtn')) {
            document.getElementById('editTextBtn').onclick = async () => {
                const newText = prompt('Новый текст описания:', upload.text);
                if (newText !== null) {
                    await apiCall(`/api/uploads/${upload.id}`, { method: 'PUT', body: JSON.stringify({ text: newText }) });
                    showMessage('Описание обновлено');
                    loadGallery();
                    loadHistory();
                    upload.text = newText;
                    document.getElementById('modalText').innerHTML = escapeHtml(newText);
                }
            };
        }
    }

    async function refreshModalStats(uploadId) {
        const upload = currentUploads.find(u => u.id == uploadId);
        if (upload) {
            document.getElementById('likeCount').innerText = upload.likes || 0;
            document.getElementById('dislikeCount').innerText = upload.dislikes || 0;
        }
    }

    async function loadComments(uploadId) {
        const comments = await apiCall(`/api/uploads/${uploadId}/comments`);
        const container = document.getElementById('commentsList');
        if (!comments.length) {
            container.innerHTML = '<p>Нет комментариев</p>';
            return;
        }
        container.innerHTML = comments.map(c => `
            <div class="comment" data-id="${c.id}">
                <div class="comment-text">
                    <div class="comment-meta"><strong>${escapeHtml(c.username)}</strong> <small>${new Date(c.created_at).toLocaleString()}</small></div>
                    <div>${escapeHtml(c.text)}</div>
                </div>
                <div class="comment-actions">
                    ${currentUser && (currentUser.is_admin || currentUser.id === c.user_id) ? `<button class="delete-comment" data-id="${c.id}"><i class="fas fa-trash-alt"></i></button>` : ''}
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.delete-comment').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const commentId = btn.getAttribute('data-id');
                if (confirm('Удалить комментарий?')) {
                    await apiCall(`/api/comments/${commentId}`, { method: 'DELETE' });
                    showMessage('Комментарий удалён');
                    loadComments(uploadId);
                }
            });
        });
    }

    async function addComment(uploadId, text) {
        if (!currentUser) throw new Error('Войдите');
        await apiCall(`/api/uploads/${uploadId}/comments`, { method: 'POST', body: JSON.stringify({ text }) });
        await loadComments(uploadId);
    }

    async function setLike(uploadId, value) {
        if (!currentUser) { showMessage('Войдите', true); return; }
        await apiCall(`/api/uploads/${uploadId}/like`, { method: 'POST', body: JSON.stringify({ value }) });
        await refreshModalStats(uploadId);
    }

    // Polling для уведомлений
    async function checkActivities() {
        try {
            const activities = await apiCall('/api/activities');
            // Проверяем новые комментарии
            if (activities.comments && activities.comments.length) {
                const newComments = activities.comments.filter(c => !lastActivityIds.comments.includes(c.id));
                for (let comment of newComments) {
                    if (currentModalUpload && comment.upload_id == currentModalUpload.id) {
                        // Если это открытое фото, обновим комментарии
                        await loadComments(currentModalUpload.id);
                    }
                    showMessage(`💬 ${comment.username} прокомментировал фото: "${comment.text.substring(0, 50)}"`);
                }
                lastActivityIds.comments = activities.comments.map(c => c.id);
            }
            // Аналогично для лайков (можно добавить)
        } catch(e) {
            // игнорируем ошибки polling
        }
    }

    function startPolling() {
        if (activityInterval) clearInterval(activityInterval);
        activityInterval = setInterval(checkActivities, 10000);
    }

    function renderAuthPanel() {
        const panel = document.getElementById('authPanel');
        if (currentUser) {
            panel.innerHTML = `<div>Вы вошли как ${escapeHtml(currentUser.username)} ${currentUser.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</div>`;
            return;
        }
        panel.innerHTML = `
            <div style="display:flex; gap:2rem; flex-wrap:wrap;">
                <div style="flex:1">
                    <h3>Вход</h3>
                    <input id="loginUser" placeholder="Логин"><br>
                    <input id="loginPass" type="password" placeholder="Пароль"><br>
                    <button id="doLogin">Войти</button>
                </div>
                <div style="flex:1">
                    <h3>Регистрация</h3>
                    <input id="regUser" placeholder="Логин"><br>
                    <input id="regPass" type="password" placeholder="Пароль"><br>
                    <button id="doReg">Зарегистрироваться</button>
                </div>
            </div>
        `;
        document.getElementById('doLogin').onclick = () => {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            login(user, pass);
        };
        document.getElementById('doReg').onclick = () => {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            register(user, pass);
        };
    }

    function renderUploadPanel() {
        const panel = document.getElementById('uploadPanel');
        if (!currentUser) {
            panel.style.display = 'none';
            return;
        }
        panel.style.display = 'block';
        const fileInput = document.getElementById('uploadFile');
        const textInput = document.getElementById('uploadText');
        const preview = document.getElementById('uploadPreview');
        const submitBtn = document.getElementById('submitUpload');
        const fileError = document.getElementById('fileError');

        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                if (!file.type.startsWith('image/')) {
                    fileError.innerText = '❌ Неподдерживаемый формат';
                    submitBtn.disabled = true;
                    preview.innerHTML = '';
                    return;
                }
                if (file.size > 3 * 1024 * 1024) {
                    fileError.innerText = '❌ Файл слишком большой (макс 3 МБ)';
                    submitBtn.disabled = true;
                    preview.innerHTML = '';
                    return;
                }
                fileError.innerText = '';
                submitBtn.disabled = false;
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}" style="max-width:100px; border-radius:8px;">`;
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
                submitBtn.disabled = true;
                fileError.innerText = '';
            }
        };

        submitBtn.onclick = async () => {
            const file = fileInput.files[0];
            const text = textInput.value;
            if (!file) { showMessage('Выберите фото', true); return; }
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';
            try {
                await uploadPhoto(file, text);
                showMessage('Фото загружено!');
                fileInput.value = '';
                textInput.value = '';
                preview.innerHTML = '';
                fileError.innerText = '';
                loadGallery();
                loadHistory();
                if (currentUser.is_admin) loadAdminPanel();
            } catch (e) {
                showMessage(e.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Загрузить';
            }
        };
    }

    function renderUserArea() {
        const area = document.getElementById('userArea');
        if (currentUser) {
            area.innerHTML = `
                <span>${escapeHtml(currentUser.username)} ${currentUser.verified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''} ${currentUser.is_admin ? '<span style="background:#e67e22; padding:0.2rem 0.5rem; border-radius:1rem;">ADMIN</span>' : ''}</span>
                <button id="logoutBtn">Выйти</button>
            `;
            document.getElementById('logoutBtn').onclick = logout;
        } else {
            area.innerHTML = `<span>Гость</span>`;
        }
    }

    function renderUI() {
        renderAuthPanel();
        renderUploadPanel();
        renderUserArea();
        loadGallery();
        loadHistory();
        loadAdminPanel();
        startPolling();
    }

    document.getElementById('searchInput').addEventListener('input', () => loadGallery());
    document.getElementById('modal').querySelector('.close-modal').onclick = () => {
        document.getElementById('modal').style.display = 'none';
    };
    document.getElementById('submitComment').onclick = async () => {
        const text = document.getElementById('newCommentText').value;
        if (!text) return;
        try {
            await addComment(currentModalUpload.id, text);
            document.getElementById('newCommentText').value = '';
        } catch (e) {
            showMessage(e.message, true);
        }
    };
    document.getElementById('modalLikeBtn').onclick = () => setLike(currentModalUpload.id, 1);
    document.getElementById('modalDislikeBtn').onclick = () => setLike(currentModalUpload.id, -1);
    document.getElementById('copyLinkBtn').onclick = () => {
        const url = `${window.location.origin}/?photo=${currentModalUpload.id}`;
        navigator.clipboard.writeText(url);
        showMessage('Ссылка скопирована');
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Запуск
    showLoader();
    loadCurrentUser();
</script>
</body>
</html>
