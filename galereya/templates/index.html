<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaGallery — Галерея с модерацией</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0c10;
            color: #f0f3f8;
            padding: 1.5rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #11161d;
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            border: 1px solid #2a2f3a;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #a78bfa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-area {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        button, .button-like {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #5b4bc4;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a2f3a;
        }
        .form-card {
            background: #11161d;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #2a2f3a;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #1a1f2a;
            border: 1px solid #2a2f3a;
            border-radius: 1rem;
            color: #f0f3f8;
            font-family: inherit;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }
        .photo-card {
            background: #1a1f2a;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid #2a2f3a;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 1rem;
        }
        .card-text {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #9aa4bf;
        }
        .badge-pending {
            background: #e67e22;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #11161d;
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }
        .modal-img {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
        }
        .modal-info {
            padding: 1.5rem;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: white;
        }
        .like-buttons {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }
        .like-btn, .dislike-btn {
            background: none;
            border: 1px solid #2a2f3a;
            padding: 0.3rem 0.8rem;
        }
        .comments-section {
            margin-top: 1rem;
        }
        .comment {
            border-bottom: 1px solid #2a2f3a;
            padding: 0.5rem 0;
        }
        .admin-section {
            background: #11161d;
            border-radius: 1.5rem;
            padding: 1rem;
            margin: 1rem 0;
        }
        .user-item, .pending-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            border-bottom: 1px solid #2a2f3a;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            z-index: 1100;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        hr {
            border-color: #2a2f3a;
            margin: 1rem 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-images"></i> LuminaGallery</h1>
            <p>Модерация, лайки, комментарии</p>
        </div>
        <div id="userArea" class="user-area"></div>
    </div>

    <div id="authPanel" class="form-card"></div>
    <div id="uploadPanel" style="display: none;" class="form-card">
        <h3><i class="fas fa-cloud-upload-alt"></i> Добавить фото</h3>
        <div class="input-group">
            <input type="file" id="uploadFile" accept="image/jpeg,image/png,image/webp">
        </div>
        <div class="input-group">
            <textarea id="uploadText" rows="2" placeholder="Описание..."></textarea>
        </div>
        <button id="submitUpload">Загрузить</button>
        <div id="uploadPreview" style="margin-top: 10px;"></div>
    </div>

    <div class="flex-between">
        <h2>Галерея</h2>
        <input type="text" id="searchInput" placeholder="🔍 Поиск..." style="width: 250px;">
    </div>
    <div id="galleryContainer" class="gallery-grid"></div>

    <div id="historySection" style="margin-top: 2rem; display: none;">
        <h2>Мои загрузки (история)</h2>
        <div id="historyContainer" class="gallery-grid"></div>
    </div>

    <div id="adminPanel"></div>
</div>

<div id="modal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="">
        <div class="modal-info">
            <div id="modalMeta"></div>
            <div class="like-buttons">
                <button id="modalLikeBtn" class="like-btn"><i class="fas fa-thumbs-up"></i> <span id="likeCount">0</span></button>
                <button id="modalDislikeBtn" class="dislike-btn"><i class="fas fa-thumbs-down"></i> <span id="dislikeCount">0</span></button>
            </div>
            <div class="comments-section">
                <h4>Комментарии</h4>
                <div id="commentsList"></div>
                <div class="input-group">
                    <textarea id="newCommentText" rows="2" placeholder="Ваш комментарий..."></textarea>
                    <button id="submitComment">Отправить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // API helpers
    let currentUser = null;
    let currentModalUploadId = null;

    async function apiCall(url, options = {}) {
        const response = await fetch(url, {
            credentials: 'include',
            headers: { 'Content-Type': 'application/json', ...options.headers },
            ...options
        });
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.error || 'Request failed');
        }
        if (response.status === 204) return null;
        return await response.json();
    }

    function showMessage(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#e74c3c' : '#2ecc71';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadCurrentUser() {
        try {
            const user = await apiCall('/api/me');
            currentUser = user;
            renderUI();
        } catch (e) {
            currentUser = null;
            renderUI();
        }
    }

    async function login(username, password) {
        try {
            const user = await apiCall('/api/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            currentUser = user;
            renderUI();
            showMessage(`Добро пожаловать, ${username}`);
        } catch (e) {
            showMessage(e.message, true);
        }
    }

    async function register(username, password) {
        try {
            await apiCall('/api/register', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            showMessage('Регистрация успешна, теперь войдите');
        } catch (e) {
            showMessage(e.message, true);
        }
    }

    async function logout() {
        await apiCall('/api/logout', { method: 'POST' });
        currentUser = null;
        renderUI();
        showMessage('Вы вышли');
    }

    async function loadGallery() {
        const uploads = await apiCall('/api/uploads');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = uploads.filter(u => u.text.toLowerCase().includes(searchTerm) || u.username.toLowerCase().includes(searchTerm));
        const container = document.getElementById('galleryContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Нет фото</div>';
            return;
        }
        container.innerHTML = filtered.map(u => `
            <div class="photo-card" data-id="${u.id}">
                <img class="card-img" src="/uploads/${u.image_path}" alt="photo" onerror="this.src='https://placehold.co/400x400?text=error'">
                <div class="card-content">
                    <div class="card-text">${escapeHtml(u.text)}</div>
                    <div class="card-meta">
                        <span><i class="fas fa-user"></i> ${escapeHtml(u.username)}</span>
                        <span><i class="far fa-calendar-alt"></i> ${new Date(u.created_at).toLocaleDateString()}</span>
                        ${!u.approved && currentUser?.is_admin ? '<span class="badge-pending">На модерации</span>' : ''}
                    </div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.photo-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.getAttribute('data-id');
                const upload = filtered.find(u => u.id == id);
                if (upload) openModal(upload);
            });
        });
    }

    async function loadHistory() {
        if (!currentUser) return;
        const all = await apiCall('/api/uploads');
        const myUploads = all.filter(u => u.user_id === currentUser.id);
        const section = document.getElementById('historySection');
        const container = document.getElementById('historyContainer');
        if (myUploads.length === 0) {
            section.style.display = 'none';
            return;
        }
        section.style.display = 'block';
        container.innerHTML = myUploads.map(u => `
            <div class="photo-card" data-id="${u.id}">
                <img class="card-img" src="/uploads/${u.image_path}" alt="photo">
                <div class="card-content">
                    <div class="card-text">${escapeHtml(u.text)}</div>
                    <div class="card-meta">
                        <span>${new Date(u.created_at).toLocaleString()}</span>
                        <button class="delete-btn" data-id="${u.id}" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (confirm('Удалить фото?')) {
                    await apiCall(`/api/uploads/${id}`, { method: 'DELETE' });
                    showMessage('Удалено');
                    loadGallery();
                    loadHistory();
                    loadAdminPanel();
                }
            });
        });
    }

    async function loadAdminPanel() {
        const container = document.getElementById('adminPanel');
        if (!currentUser || !currentUser.is_admin) {
            container.innerHTML = '';
            return;
        }
        // users
        const users = await apiCall('/api/admin/users');
        // pending uploads
        const pending = await apiCall('/api/admin/pending');
        const userListHtml = users.map(u => `
            <div class="user-item">
                <span>${escapeHtml(u.username)} ${u.is_admin ? '(Админ)' : ''}</span>
                ${!u.is_admin ? `<button class="del-user" data-id="${u.id}">Удалить</button>` : ''}
            </div>
        `).join('');
        const pendingHtml = pending.map(p => `
            <div class="pending-item">
                <span>${escapeHtml(p.username)}: ${escapeHtml(p.text.substring(0,50))}</span>
                <button class="approve-btn" data-id="${p.id}">Одобрить</button>
                <button class="del-pending" data-id="${p.id}">Удалить</button>
            </div>
        `).join('');
        container.innerHTML = `
            <div class="admin-section">
                <h3>Админ-панель</h3>
                <h4>Пользователи</h4>
                ${userListHtml || '<p>Нет</p>'}
                <hr>
                <h4>Ожидают одобрения</h4>
                ${pendingHtml || '<p>Нет</p>'}
            </div>
        `;
        container.querySelectorAll('.del-user').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                if (confirm('Удалить пользователя?')) {
                    await apiCall(`/api/admin/users/${id}`, { method: 'DELETE' });
                    showMessage('Пользователь удалён');
                    loadAdminPanel();
                    loadGallery();
                }
            });
        });
        container.querySelectorAll('.approve-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                await apiCall(`/api/uploads/${id}/approve`, { method: 'POST' });
                showMessage('Фото одобрено');
                loadAdminPanel();
                loadGallery();
            });
        });
        container.querySelectorAll('.del-pending').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                await apiCall(`/api/uploads/${id}`, { method: 'DELETE' });
                showMessage('Удалено');
                loadAdminPanel();
                loadGallery();
            });
        });
    }

    async function uploadPhoto(file, text) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('text', text);
        const response = await fetch('/api/uploads', {
            method: 'POST',
            credentials: 'include',
            body: formData
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error);
        }
        return await response.json();
    }

    async function openModal(upload) {
        currentModalUploadId = upload.id;
        document.getElementById('modalImg').src = `/uploads/${upload.image_path}`;
        document.getElementById('modalMeta').innerHTML = `<strong>${escapeHtml(upload.username)}</strong><br>${escapeHtml(upload.text)}<br><small>${new Date(upload.created_at).toLocaleString()}</small>`;
        await refreshModalStats(upload.id);
        await loadComments(upload.id);
        document.getElementById('modal').style.display = 'flex';
    }

    async function refreshModalStats(uploadId) {
        const upload = (await apiCall('/api/uploads')).find(u => u.id == uploadId);
        if (upload) {
            document.getElementById('likeCount').innerText = upload.likes || 0;
            document.getElementById('dislikeCount').innerText = upload.dislikes || 0;
        }
    }

    async function loadComments(uploadId) {
        const comments = await apiCall(`/api/uploads/${uploadId}/comments`);
        const container = document.getElementById('commentsList');
        if (!comments.length) {
            container.innerHTML = '<p>Нет комментариев</p>';
            return;
        }
        container.innerHTML = comments.map(c => `
            <div class="comment">
                <strong>${escapeHtml(c.username)}</strong> <small>${new Date(c.created_at).toLocaleString()}</small><br>
                ${escapeHtml(c.text)}
            </div>
        `).join('');
    }

    async function addComment(uploadId, text) {
        if (!currentUser) throw new Error('Войдите');
        await apiCall(`/api/uploads/${uploadId}/comments`, {
            method: 'POST',
            body: JSON.stringify({ text })
        });
        await loadComments(uploadId);
    }

    async function setLike(uploadId, value) {
        if (!currentUser) { showMessage('Войдите', true); return; }
        await apiCall(`/api/uploads/${uploadId}/like`, {
            method: 'POST',
            body: JSON.stringify({ value })
        });
        await refreshModalStats(uploadId);
    }

    function renderAuthPanel() {
        const panel = document.getElementById('authPanel');
        if (currentUser) {
            panel.innerHTML = `<div>Вы вошли как ${escapeHtml(currentUser.username)}</div>`;
            return;
        }
        panel.innerHTML = `
            <div style="display:flex; gap:2rem; flex-wrap:wrap;">
                <div style="flex:1">
                    <h3>Вход</h3>
                    <input id="loginUser" placeholder="Логин"><br>
                    <input id="loginPass" type="password" placeholder="Пароль"><br>
                    <button id="doLogin">Войти</button>
                </div>
                <div style="flex:1">
                    <h3>Регистрация</h3>
                    <input id="regUser" placeholder="Логин"><br>
                    <input id="regPass" type="password" placeholder="Пароль"><br>
                    <button id="doReg">Зарегистрироваться</button>
                </div>
            </div>
        `;
        document.getElementById('doLogin').onclick = () => {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            login(user, pass);
        };
        document.getElementById('doReg').onclick = () => {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            register(user, pass);
        };
    }

    function renderUploadPanel() {
        const panel = document.getElementById('uploadPanel');
        if (!currentUser) {
            panel.style.display = 'none';
            return;
        }
        panel.style.display = 'block';
        const fileInput = document.getElementById('uploadFile');
        const textInput = document.getElementById('uploadText');
        const preview = document.getElementById('uploadPreview');
        fileInput.onchange = () => {
            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => preview.innerHTML = `<img src="${e.target.result}" style="max-width:100px; border-radius:8px;">`;
                reader.readAsDataURL(fileInput.files[0]);
            } else preview.innerHTML = '';
        };
        document.getElementById('submitUpload').onclick = async () => {
            const file = fileInput.files[0];
            const text = textInput.value;
            if (!file) { showMessage('Выберите фото', true); return; }
            try {
                await uploadPhoto(file, text);
                showMessage('Загружено' + (currentUser.is_admin ? '' : ' (ожидает модерации)'));
                fileInput.value = '';
                textInput.value = '';
                preview.innerHTML = '';
                loadGallery();
                loadHistory();
                if (currentUser.is_admin) loadAdminPanel();
            } catch (e) {
                showMessage(e.message, true);
            }
        };
    }

    function renderUserArea() {
        const area = document.getElementById('userArea');
        if (currentUser) {
            area.innerHTML = `
                <span>${escapeHtml(currentUser.username)} ${currentUser.is_admin ? '<span style="background:#e67e22; padding:0.2rem 0.5rem; border-radius:1rem;">ADMIN</span>' : ''}</span>
                <button id="logoutBtn">Выйти</button>
            `;
            document.getElementById('logoutBtn').onclick = logout;
        } else {
            area.innerHTML = `<span>Гость</span>`;
        }
    }

    function renderUI() {
        renderAuthPanel();
        renderUploadPanel();
        renderUserArea();
        loadGallery();
        loadHistory();
        loadAdminPanel();
    }

    document.getElementById('searchInput').addEventListener('input', () => loadGallery());
    document.getElementById('modal').querySelector('.close-modal').onclick = () => {
        document.getElementById('modal').style.display = 'none';
    };
    document.getElementById('submitComment').onclick = async () => {
        const text = document.getElementById('newCommentText').value;
        if (!text) return;
        try {
            await addComment(currentModalUploadId, text);
            document.getElementById('newCommentText').value = '';
        } catch (e) {
            showMessage(e.message, true);
        }
    };
    document.getElementById('modalLikeBtn').onclick = () => setLike(currentModalUploadId, 1);
    document.getElementById('modalDislikeBtn').onclick = () => setLike(currentModalUploadId, -1);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadCurrentUser();
</script>
</body>
</html>
